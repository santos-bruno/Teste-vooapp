name: Release APK

# Publica um Release com o APK anexado. Pode ser disparado de duas formas:
#  - criando uma tag de versão (ex.: v1.0.0), ou
#  - manualmente (workflow_dispatch), informando a versão.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag da versão (ex.: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: v
        run: echo "version=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APKs with version
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "vooapp-${{ steps.v.outputs.version }}.apk"
          cp dance/build/outputs/apk/debug/dance-debug.apk "justvoo-dance-${{ steps.v.outputs.version }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.version }}
          name: "VooApp ${{ steps.v.outputs.version }}"
          files: |
            vooapp-${{ steps.v.outputs.version }}.apk
            justvoo-dance-${{ steps.v.outputs.version }}.apk
          generate_release_notes: true
